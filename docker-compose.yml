
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: purplle
      POSTGRES_PASSWORD: purplle123
      POSTGRES_DB: store_intelligence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purplle -d store_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://purplle:purplle123@db:5432/store_intelligence
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - .:/app

volumes:
  pgdata: